name: quic
version: 0.1.0

authors:
  - tony <antonio.difluri@gmail.com>

description: |
  A native, pure-Crystal implementation of the QUIC transport protocol (RFC 9000) and HTTP/3 (RFC 9114). Features a sans-I/O QUIC core, QPACK compression, and a robust HTTP/3 client/server.

crystal: '>= 1.20.2'

