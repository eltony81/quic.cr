name: CI
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: crystal-lang/install-crystal@v1
    - run: /home/linuxbrew/.linuxbrew/bin/brew install openssl@3
    - run: shards install || true
    - run: |
        export PKG_CONFIG_PATH="/home/linuxbrew/.linuxbrew/opt/openssl@3/lib/pkgconfig"
        export LD_LIBRARY_PATH="/home/linuxbrew/.linuxbrew/opt/openssl@3/lib"
        crystal spec
    - run: |
        export PKG_CONFIG_PATH="/home/linuxbrew/.linuxbrew/opt/openssl@3/lib/pkgconfig"
        export LD_LIBRARY_PATH="/home/linuxbrew/.linuxbrew/opt/openssl@3/lib"
        crystal build examples/h3_server_routed.cr --no-codegen

  cross-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v6
    - uses: crystal-lang/install-crystal@v1
    - uses: actions/setup-go@v5
      with:
        go-version: '1.23'
    - run: /home/linuxbrew/.linuxbrew/bin/brew install openssl@3
    - run: |
        export PKG_CONFIG_PATH="/home/linuxbrew/.linuxbrew/opt/openssl@3/lib/pkgconfig"
        export LD_LIBRARY_PATH="/home/linuxbrew/.linuxbrew/opt/openssl@3/lib"
        crystal build examples/e2e_server.cr -o /tmp/e2e_server --release
    - run: |
        export PATH="/home/linuxbrew/.linuxbrew/opt/openssl@3/bin:$PATH"
        openssl req -x509 -newkey rsa:2048 -keyout key.pem -out cert.pem -days 1 -nodes -subj '/CN=localhost'
    - run: |
        export LD_LIBRARY_PATH="/home/linuxbrew/.linuxbrew/opt/openssl@3/lib"
        cd bench/go_client/cross_test
        go build -o cross_test .
        timeout 120 ./cross_test -start-server

