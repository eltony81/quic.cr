name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install OpenSSL 3 via Homebrew
        run: |
          /home/linuxbrew/.linuxbrew/bin/brew install openssl@3
          echo "PKG_CONFIG_PATH=/home/linuxbrew/.linuxbrew/opt/openssl@3/lib/pkgconfig" >> $GITHUB_ENV

      - name: Run unit tests
        run: crystal spec

      - name: Build example server
        run: crystal build examples/h3_server_routed.cr --no-codegen

  cross-test:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install OpenSSL 3 via Homebrew
        run: |
          /home/linuxbrew/.linuxbrew/bin/brew install openssl@3
          echo "PKG_CONFIG_PATH=/home/linuxbrew/.linuxbrew/opt/openssl@3/lib/pkgconfig" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install aioquic
        run: pip install aioquic

      - name: Generate TLS certs
        run: |
          /home/linuxbrew/.linuxbrew/opt/openssl@3/bin/openssl req -x509 -newkey rsa:2048 -keyout key.pem -out cert.pem \
            -days 1 -nodes -subj '/CN=localhost'

      - name: Run cross-tests
        run: timeout 120 python examples/validate_cross_tests.py
        timeout-minutes: 3

